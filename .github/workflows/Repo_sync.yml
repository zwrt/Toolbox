name: Repo_sync

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: 0 * * * *

jobs:
  New-Update-Files:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 0
        keep_minimum_runs: 3

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -e

        sudo timedatectl set-timezone "Asia/Shanghai"
        mkdir -p ./file

        wget -q --show-progress -O ./file/README.md https://raw.githubusercontent.com/zwrt/IPTV/Files/README.md
        wget -q --show-progress -O ./file/kejilion.sh https://raw.githubusercontent.com/kejilion/sh/main/kejilion.sh
        wget -q --show-progress -O ./file/InstallNET.sh https://raw.githubusercontent.com/MoeClub/Note/master/InstallNET.sh

        git clone --depth=1 --branch=main https://github.com/walkxcode/dashboard-icons.git
        rm -rf ./file/png
        cp -R dashboard-icons/png ./file/
        rm -rf dashboard-icons/

    - name: Commit (only if changes)
      id: commit
      run: |
        set -e

        git config --local user.name "GitHub Actions"
        git config --local user.email "actions@github.com"

        Emoji=("🎉" "🤞" "✨" "🎁" "🎈" "🎄" "🎨" "💋" "🍓" "🍕" "🍉" "💐" "🌴" "🚀" "🛸" "🗽" "⛅" "🌈" "🔥" "⛄" "🐶" "🏅" "🦄" "🐤")

        git add .

        if git diff --cached --quiet; then
          echo "No changes detected, skip commit and push."
          echo "PUSH_NEEDED=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        R=$((RANDOM % ${#Emoji[@]}))
        EMOJI="${Emoji[$R]}"
        TS="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"

        git commit -m "${EMOJI} Sync ${TS} ${EMOJI}"
        git pull --rebase

        echo "PUSH_NEEDED=true" >> "$GITHUB_OUTPUT"

    - name: Push changes (only if committed)
      if: steps.commit.outputs.PUSH_NEEDED == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GH_TOKEN }}
